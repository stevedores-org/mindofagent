name: Swift

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref. Push to a PR branch and the older
# in-flight run is dropped so we don't queue up redundant work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: swift build + test
    # macos-14 ships with Xcode preinstalled (XCTest available). The Command
    # Line Tools toolchain does not bundle XCTest, so `swift test` only works
    # on runners with a full Xcode install.
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: swift --version
        run: swift --version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: swift build
        run: swift build -v

      - name: swift test
        run: swift test -v
