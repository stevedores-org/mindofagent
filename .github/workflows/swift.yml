name: Swift

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs only on PR branches. On main we want a green
# check per commit (otherwise bisect loses signal), so let main runs
# complete even if a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Pure build/test job — read-only is enough.
permissions:
  contents: read

jobs:
  swift:
    name: swift build + test
    # macos-14 ships with Xcode preinstalled (XCTest available). The Command
    # Line Tools toolchain does not bundle XCTest, so `swift test` only works
    # on runners with a full Xcode install.
    runs-on: macos-14
    # Caps a hung test at 20 min so macOS minutes can't run away. Anything
    # longer than ~5 min for this scaffold is already a sign something's wrong.
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: swift --version
        run: swift --version

      - name: Capture Xcode version
        id: xcode
        run: |
          version=$(xcodebuild -version | head -1 | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Xcode $version"

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          # Xcode version is in the key so a toolchain rev invalidates stale
          # .build artifacts — otherwise mysterious "module not found after
          # rename" errors surface that look unrelated to the diff.
          key: swiftpm-${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-
            swiftpm-${{ runner.os }}-

      - name: swift build
        run: swift build -v

      - name: swift test
        run: swift test -v
